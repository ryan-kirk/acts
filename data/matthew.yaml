tags:
  - id: nativity
    label: Nativity
    description: Events focused on Jesus's conception, birth, and early promise.
    group: theology

  - id: holy_spirit
    label: Holy Spirit
    description: Events centered on the Spirit's empowering presence.
    group: theology

  - id: preaching
    label: Preaching
    description: Events centered on proclamation, speech, or public witness.
    group: proclamation

  - id: discipleship
    label: Discipleship
    description: Events focused on hearing, following, and responding to Jesus.
    group: response

  - id: miracle
    label: Miracle
    description: Events marked by extraordinary acts of divine power.
    group: sign

  - id: leadership
    label: Leadership
    description: Events focused on communal leadership and apostolic direction.
    group: governance

  - id: resurrection
    label: Resurrection
    description: Events centered on post-resurrection witness and recognition.
    group: theology

literary_units:
  - id: matthew_unit_001
    book_id: matthew
    title: Origins, Protection, And Baptismal Preparation
    unit_type: narrative
    passage:
      start_chapter: 1
      start_verse: 1
      end_chapter: 4
      end_verse: 17
    summary: >
      Matthew opens with royal genealogy, infancy protection material,
      wilderness preparation, and the baptismal threshold to Jesus's public
      ministry.
    location_id: bethlehem
    participant_ids:
      - jesus
      - mary_mother_of_jesus
      - joseph_husband_of_mary
      - john_the_baptist
    related_place_ids:
      - jordan_river
    related_event_ids:
      - matthew_001
      - matthew_002
      - matthew_003
    source_refs:
      - source_id: matthew
        citation: Matthew 1:1-4:17

  - id: matthew_unit_002
    book_id: matthew
    title: Kingdom Teaching And Galilean Provision
    unit_type: discourse
    passage:
      start_chapter: 5
      start_verse: 1
      end_chapter: 14
      end_verse: 21
    summary: >
      Major teaching, discipleship formation, and the feeding sign frame the
      authority and compassion of Jesus's Galilean ministry.
    location_id: sea_of_galilee
    participant_ids:
      - jesus
      - peter
      - james_zebedee
      - john
    related_event_ids:
      - matthew_004
      - matthew_005
    source_refs:
      - source_id: matthew
        citation: Matthew 5:1-14:21

  - id: matthew_unit_003
    book_id: matthew
    title: Identity Confession And Jerusalem Approach
    unit_type: narrative
    passage:
      start_chapter: 16
      start_verse: 13
      end_chapter: 21
      end_verse: 11
    summary: >
      Peter's confession and the entry into Jerusalem frame the movement from
      revealed identity toward the final public conflict.
    location_id: caesarea_philippi
    participant_ids:
      - jesus
      - peter
    related_person_ids:
      - james_zebedee
      - john
    related_place_ids:
      - jerusalem
    related_event_ids:
      - matthew_006
      - matthew_007
    source_refs:
      - source_id: matthew
        citation: Matthew 16:13-21:11

  - id: matthew_unit_004
    book_id: matthew
    title: Passion, Resurrection, And Universal Commission
    unit_type: epilogue
    passage:
      start_chapter: 26
      start_verse: 1
      end_chapter: 28
      end_verse: 20
    summary: >
      Matthew closes with passion, resurrection, and the Galilean commission
      that extends the Gospel's horizon to all nations.
    location_id: galilee
    participant_ids:
      - jesus
      - peter
      - james_zebedee
      - john
    related_event_ids:
      - matthew_008
    source_refs:
      - source_id: matthew
        citation: Matthew 26:1-28:20

claims:
  - id: claim_synoptic_bethlehem_birth
    statement: >
      Matthew and Luke both anchor Jesus's birth in Bethlehem, while each
      Gospel preserves distinct surrounding infancy material and theological
      emphasis.
    claim_type: synoptic_continuity
    confidence: high
    related_event_ids:
      - matthew_001
    related_person_ids:
      - jesus
      - mary_mother_of_jesus
      - joseph_husband_of_mary
    related_place_ids:
      - bethlehem
    source_refs:
      - source_id: matthew
        citation: Matthew 1:18-2:6

  - id: claim_synoptic_baptism_inaugural_witness
    statement: >
      Matthew, Mark, and Luke each preserve Jesus's baptism by John as an
      inaugural public scene, though they frame the heavenly affirmation and
      surrounding narrative differently.
    claim_type: synoptic_parallel
    confidence: high
    related_event_ids:
      - matthew_003
    related_person_ids:
      - jesus
      - john_the_baptist
    related_place_ids:
      - jordan_river
    source_refs:
      - source_id: matthew
        citation: Matthew 3:13-17

  - id: claim_matthew_discourse_architecture
    statement: >
      Matthew concentrates Jesus's teaching into major discourse blocks, and
      the Sermon on the Mount functions as a defining early concentration of
      kingdom ethics and disciple formation.
    claim_type: literary_structure
    confidence: medium
    related_event_ids:
      - matthew_004
    related_person_ids:
      - jesus
      - peter
    related_place_ids:
      - sea_of_galilee
    source_refs:
      - source_id: matthew
        citation: Matthew 5:1-7:29
      - source_id: france_matthew_commentary
        citation: France, Matthew, on 5:1-7:29

  - id: claim_synoptic_feeding_five_thousand
    statement: >
      Matthew, Mark, and Luke all preserve the feeding of the five thousand,
      while retaining distinct geographic and narrative emphases.
    claim_type: synoptic_parallel
    confidence: high
    related_event_ids:
      - matthew_005
    related_person_ids:
      - jesus
      - peter
    related_place_ids:
      - sea_of_galilee
    source_refs:
      - source_id: matthew
        citation: Matthew 14:13-21

  - id: claim_synoptic_entry_jerusalem
    statement: >
      Matthew, Mark, and Luke each narrate Jesus's royal entry into Jerusalem
      as a public threshold to the passion, while preserving witness-specific
      details.
    claim_type: synoptic_parallel
    confidence: high
    related_event_ids:
      - matthew_007
    related_person_ids:
      - jesus
    related_place_ids:
      - jerusalem
    source_refs:
      - source_id: matthew
        citation: Matthew 21:1-11

  - id: claim_matthew_commission_nations_scope
    statement: >
      Matthew closes by concentrating resurrection authority and the mission to
      all nations into a single Galilean commission scene.
    claim_type: narrative_structure
    confidence: medium
    related_event_ids:
      - matthew_008
    related_person_ids:
      - jesus
      - peter
    related_place_ids:
      - galilee
    source_refs:
      - source_id: matthew
        citation: Matthew 28:16-20
      - source_id: france_matthew_commentary
        citation: France, Matthew, on 28:16-20
