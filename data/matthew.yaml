metadata:
  dataset_id: matthew
  title: Gospel of Matthew Canonical Dataset
  version: "1.0.0"
  schema_version: "1.0.0"
  description: >
    Canonical Matthew dataset for Bible Time & Place Explorer, modeled with
    normalized synoptic records, shared entities, literary units, and
    source-backed claims that merge cleanly with the broader scripture library.
  created: "2026-06-12"
  updated: "2026-06-27"

books:
  - id: matthew
    label: Matthew
    title: Gospel of Matthew
    testament: new_testament
    canonical_order: 1
    corpus: gospel
    genre:
      - gospel
      - narrative
      - discourse
    summary: >
      Matthew presents Jesus as Israel's Messiah and authoritative teacher,
      weaving birth, kingdom proclamation, conflict, passion, resurrection, and
      mission into a Gospel shaped by scriptural fulfillment.
    authorship_note: Traditionally attributed to Matthew the apostle.
    primary_source_id: matthew
    related_person_ids:
      - jesus
      - mary_mother_of_jesus
      - joseph_husband_of_mary
      - john_the_baptist
      - peter
      - james_zebedee
      - john
    related_place_ids:
      - bethlehem
      - nazareth
      - jordan_river
      - sea_of_galilee
      - caesarea_philippi
      - jerusalem
      - galilee
    source_refs:
      - source_id: matthew
        citation: Matthew 1:1-28:20

sources:
  - id: matthew
    name: Gospel of Matthew
    type: scripture
    citation: New Testament, Matthew 1-28
    author: Traditionally attributed to Matthew
    publication_date: 1st century AD
    usage_rights:
      status: not_applicable
      attribution_text: >
        This dataset stores canonical scripture citations to Matthew and does
        not reproduce licensed Bible translation text.
      usage_notes: >
        Event, place, person, and literary-unit records remain citation-based
        only. Any future embedded translation text will require separate rights
        review.
      trademark_usage_note: >
        If ESV-branded scripture text is added later, the ESV name and logo
        must not be used as product branding without permission.
      commercial_use_note: >
        Any future commercial Bible-reference workflow that embeds direct ESV
        text will require written permission and explicit release review.
      requires_written_permission_for_commercial_use: true
  - id: france_matthew_commentary
    name: The Gospel of Matthew
    type: commentary
    author: R. T. France
    citation: New International Commentary on the New Testament
    publication_date: "2007"
    usage_rights:
      status: restricted
      attribution_text: >
        Commentary references support interpretive claims without embedding
        copyrighted prose.
      usage_notes: >
        Any future quotations or extended excerpts require publisher-specific
        rights review and attribution.

places:
  - id: bethlehem
    name: Bethlehem
    latitude: 31.7054
    longitude: 35.2024
    region: Judea
    modern_country: Israel
    location_certainty: exact
    source_refs:
      - source_id: matthew
        citation: Matthew 2:1

  - id: nazareth
    name: Nazareth
    latitude: 32.6996
    longitude: 35.3035
    region: Galilee
    modern_country: Israel
    location_certainty: exact
    source_refs:
      - source_id: matthew
        citation: Matthew 2:23

  - id: jordan_river
    name: Jordan River
    latitude: 31.8374
    longitude: 35.555
    region: Judean Wilderness
    modern_country: Jordan
    location_certainty: approximate
    summary: >
      The Jordan River marks the wilderness-water setting associated with
      John's baptism ministry and the inauguration scenes of Jesus's public
      ministry in the Synoptic Gospels.
    source_refs:
      - source_id: matthew
        citation: Matthew 3:5-17

  - id: sea_of_galilee
    name: Sea of Galilee
    latitude: 32.8333
    longitude: 35.5833
    region: Galilee
    modern_country: Israel
    location_certainty: exact
    summary: >
      The Sea of Galilee and its surrounding shore settlements form a major
      theater for Synoptic teaching, calling, healing, and feeding narratives.
    source_refs:
      - source_id: matthew
        citation: Matthew 4:18-25

  - id: caesarea_philippi
    name: Caesarea Philippi
    latitude: 33.2486
    longitude: 35.6964
    region: Iturea
    modern_country: Israel
    location_certainty: approximate
    summary: >
      Caesarea Philippi stands near the northern edge of Jesus's public
      activity and becomes a key identity-confession setting in the Synoptic
      tradition.
    source_refs:
      - source_id: matthew
        citation: Matthew 16:13-20

  - id: jerusalem
    name: Jerusalem
    latitude: 31.7683
    longitude: 35.2137
    region: Judea
    modern_country: Israel
    location_certainty: exact
    source_refs:
      - source_id: matthew
        citation: Matthew 21:1-11

  - id: galilee
    name: Galilee
    latitude: 32.85
    longitude: 35.45
    region: Galilee
    modern_country: Israel
    location_certainty: approximate
    summary: >
      Galilee is the broader northern region associated with Jesus's early
      ministry, many public signs, and the resurrection commission scene in
      Matthew.
    source_refs:
      - source_id: matthew
        citation: Matthew 28:16-20

