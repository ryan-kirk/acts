events:
  - id: matthew_001
    title: Birth of Jesus in Bethlehem
    summary: >
      Matthew anchors Jesus's birth in Bethlehem and frames it within royal
      Davidic expectation, Joseph's obedient protection, and the fulfillment of
      scriptural promise.
    date:
      start_year: -6
      end_year: -4
      certainty: estimated
    location_id: bethlehem
    participants:
      - jesus
      - mary_mother_of_jesus
      - joseph_husband_of_mary
    tag_ids:
      - nativity
    source_refs:
      - source_id: matthew
        citation: Matthew 1:18-2:6
    related_event_ids:
      - matthew_002

  - id: matthew_002
    title: Visit of the Magi
    summary: >
      The Magi's arrival brings Gentile homage, royal tension, and a public
      sign that Jesus's significance extends beyond Judea from the beginning of
      Matthew's Gospel.
    date:
      start_year: -5
      end_year: -4
      certainty: estimated
    location_id: bethlehem
    participants:
      - jesus
      - mary_mother_of_jesus
      - joseph_husband_of_mary
    tag_ids:
      - nativity
    source_refs:
      - source_id: matthew
        citation: Matthew 2:1-12
    related_event_ids:
      - matthew_001
      - matthew_003

  - id: matthew_003
    title: Baptism of Jesus by John
    summary: >
      Jesus comes to John at the Jordan, is baptized, and receives the
      heavenly affirmation that frames Matthew's public ministry around
      obedience and divine approval.
    date:
      start_year: 27
      end_year: 27
      certainty: estimated
    location_id: jordan_river
    participants:
      - jesus
      - john_the_baptist
    tag_ids:
      - holy_spirit
    source_refs:
      - source_id: matthew
        citation: Matthew 3:13-17
    related_event_ids:
      - matthew_004

  - id: matthew_004
    title: Sermon on the Mount
    summary: >
      Matthew gathers kingdom teaching on the mountain into a concentrated
      discourse that frames the character, prayer, righteousness, and
      allegiance expected of Jesus's disciples.
    date:
      start_year: 28
      end_year: 28
      certainty: estimated
    location_id: sea_of_galilee
    participants:
      - jesus
      - peter
      - james_zebedee
      - john
    tag_ids:
      - preaching
      - discipleship
    source_refs:
      - source_id: matthew
        citation: Matthew 5:1-7:29
    related_event_ids:
      - matthew_003
      - matthew_005

  - id: matthew_005
    title: Feeding of the Five Thousand
    summary: >
      Jesus feeds the gathered crowd in the wilderness setting, and Matthew
      presents the sign as both compassionate provision and a formative scene
      for the disciples.
    date:
      start_year: 29
      end_year: 29
      certainty: estimated
    location_id: sea_of_galilee
    participants:
      - jesus
      - peter
      - james_zebedee
      - john
    tag_ids:
      - miracle
      - discipleship
    source_refs:
      - source_id: matthew
        citation: Matthew 14:13-21
    related_event_ids:
      - matthew_004
      - matthew_006

  - id: matthew_006
    title: Peter Confesses Jesus at Caesarea Philippi
    summary: >
      Peter identifies Jesus as the Messiah, and Matthew pairs the confession
      with teaching about the church, revelation, and the shape of faithful
      allegiance.
    date:
      start_year: 29
      end_year: 29
      certainty: estimated
    location_id: caesarea_philippi
    participants:
      - jesus
      - peter
    tag_ids:
      - discipleship
      - leadership
    source_refs:
      - source_id: matthew
        citation: Matthew 16:13-20
    related_event_ids:
      - matthew_005
      - matthew_007

  - id: matthew_007
    title: Triumphal Entry into Jerusalem
    summary: >
      Jesus enters Jerusalem in public royal symbolism, and Matthew presents
      the entry as a decisive threshold into the final week of conflict and
      fulfillment.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
      - peter
      - james_zebedee
      - john
    tag_ids:
      - leadership
      - preaching
    source_refs:
      - source_id: matthew
        citation: Matthew 21:1-11
    related_event_ids:
      - matthew_006
      - matthew_008

  - id: matthew_008
    title: Great Commission in Galilee
    summary: >
      The risen Jesus commissions the disciples in Galilee to make disciples of
      all nations, bringing Matthew's Gospel to a close with authority,
      presence, and ongoing mission.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: galilee
    participants:
      - jesus
      - peter
      - james_zebedee
      - john
    tag_ids:
      - leadership
      - preaching
      - resurrection
    source_refs:
      - source_id: matthew
        citation: Matthew 28:16-20
    related_event_ids:
      - matthew_007

