metadata:
  dataset_id: luke
  title: Gospel of Luke Canonical Dataset
  version: 1.0.0
  schema_version: 1.0.0
  description: >
    Canonical Luke dataset for the Bible Time & Place Explorer, modeled with
    normalized places, people, events, tags, and source-backed references that
    can merge cleanly with Acts through shared stable IDs.
  created: 2026-06-11
  updated: 2026-06-11

books:
  - id: luke
    label: Luke
    title: Gospel of Luke
    testament: new_testament
    canonical_order: 3
    corpus: gospel
    genre:
      - gospel
      - narrative
    summary: >
      Luke is a narrative Gospel witness that moves from annunciation and birth
      through ministry, travel, passion, resurrection, and ascension while
      emphasizing prayer, reversal, and Spirit-shaped mission.
    authorship_note: Traditionally attributed to Luke, the companion of Paul.
    primary_source_id: luke
    recipient_group: >
      Addressed to Theophilus and framed for a broader reading community
      seeking confidence in the received apostolic account.
    source_refs:
      - source_id: luke
        citation: Luke 1:1-4

sources:
  - id: luke
    name: Gospel of Luke
    type: scripture
    citation: New Testament
    usage_rights:
      status: not_applicable
      attribution_text: >
        This dataset stores canonical scripture citations to Luke and does not
        reproduce licensed Bible translation text.
      usage_notes: >
        Event, place, person, and relationship records are grounded in passage
        references only. Any future translation text will require separate
        rights review.
      trademark_usage_note: >
        If ESV-branded scripture text is added later, the ESV name and logo
        must not be used as product branding without permission.
      commercial_use_note: >
        Any future commercial Bible-reference workflow that embeds direct ESV
        text will require written permission and explicit release review.
      requires_written_permission_for_commercial_use: true
  - id: barrington_atlas
    name: Barrington Atlas of the Greek and Roman World
    type: atlas
    author: Richard J. A. Talbert, ed.
    citation: Barrington Atlas of the Greek and Roman World
    publication_date: "2000"
    usage_rights:
      status: restricted
      attribution_text: >
        Geographic context cites the atlas bibliographically and does not
        reproduce map plates or directory entries.
      usage_notes: >
        Any future use of atlas imagery, scans, or proprietary map assets must
        receive separate permissions review.
  - id: codex_bezae
    name: Codex Bezae Cantabrigiensis
    type: manuscript
    citation: Codex Bezae (5th century), Acts and Luke witnesses
    publication_date: 5th century AD
    usage_rights:
      status: cleared
      attribution_text: >
        Manuscript witnesses are cited by shelfmark and passage only; no image
        or transcription assets are embedded.
      usage_notes: >
        If manuscript images or diplomatic transcriptions are added later,
        repository-specific terms must be surfaced in the UI.
  - id: green_luke_commentary
    name: The Gospel of Luke
    type: commentary
    author: Joel B. Green
    citation: New International Commentary on the New Testament
    publication_date: "1997"
    usage_rights:
      status: restricted
      attribution_text: >
        Commentary citations support interpretive claims without embedding
        copyrighted prose.
      usage_notes: >
        Any future quotations or excerpts require publisher-specific rights
        review and attribution.
  - id: fitzmyer_luke_anchor
    name: The Gospel According to Luke
    type: book
    author: Joseph A. Fitzmyer
    citation: Anchor Bible volumes on Luke
    usage_rights:
      status: restricted
      attribution_text: >
        Book references remain bibliographic and do not reproduce copyrighted
        explanatory text.
      usage_notes: >
        If extended quotations are added later, edition-specific permissions
        and page attribution must be surfaced.

places:
  - id: nazareth
    name: Nazareth
    latitude: 32.6996
    longitude: 35.3035
    region: Galilee
    modern_country: Israel
    location_certainty: exact
    summary: >
      Nazareth is the Galilean hometown associated with Mary, Joseph, and the
      early hidden years of Jesus, as well as Jesus's synagogue reading in
      Luke's ministry narrative.
    source_refs:
      - source_id: luke
        citation: Luke 1:26-27

  - id: bethlehem
    name: Bethlehem
    latitude: 31.7054
    longitude: 35.2024
    region: Judea
    modern_country: Israel
    location_certainty: exact
    summary: >
      Bethlehem is the Davidic town where Luke locates the birth narrative of
      Jesus and frames the messianic expectation around his arrival.
    source_refs:
      - source_id: luke
        citation: Luke 2:1-20

  - id: capernaum
    name: Capernaum
    latitude: 32.8803
    longitude: 35.5736
    region: Galilee
    modern_country: Israel
    location_certainty: approximate
    summary: >
      Capernaum functions as a major Galilean ministry base in the Synoptic
      Gospels and is tied to teaching, healing, and the call of early
      disciples.
    source_refs:
      - source_id: luke
        citation: Luke 4:31-5:11

  - id: jordan_river
    name: Jordan River
    latitude: 31.8374
    longitude: 35.555
    region: Judean Wilderness
    modern_country: Jordan
    location_certainty: approximate
    source_refs:
      - source_id: luke
        citation: Luke 3:3-22

  - id: bethsaida
    name: Bethsaida
    latitude: 32.9019
    longitude: 35.6134
    region: Galilee
    modern_country: Israel
    location_certainty: traditional
    source_refs:
      - source_id: luke
        citation: Luke 9:10-17

  - id: bethany
    name: Bethany
    latitude: 31.7717
    longitude: 35.2656
    region: Judea
    modern_country: Palestine
    location_certainty: traditional
    summary: >
      Bethany is associated with Jesus's close circle, the household of Mary,
      Martha, and Lazarus, and later ascension tradition near the close of
      Luke.
    source_refs:
      - source_id: luke
        citation: Luke 10:38-42

  - id: jericho
    name: Jericho
    latitude: 31.8667
    longitude: 35.45
    region: Judea
    modern_country: Palestine
    location_certainty: exact
    summary: >
      Jericho is the setting for Luke's Zacchaeus account, where salvation is
      narrated as coming to a household on the road toward Jerusalem.
    source_refs:
      - source_id: luke
        citation: Luke 19:1-10

  - id: emmaus
    name: Emmaus
    latitude: 31.8389
    longitude: 35.0139
    region: Judea
    modern_country: Israel
    location_certainty: traditional
    summary: >
      Emmaus is the traditionally identified village tied to Luke's post-
      resurrection road encounter, though the precise site remains debated.
    source_refs:
      - source_id: luke
        citation: Luke 24:13-35

  - id: jerusalem
    name: Jerusalem
    latitude: 31.7683
    longitude: 35.2137
    region: Judea
    modern_country: Israel
    location_certainty: exact
    summary: >
      Jerusalem is the central Judean city where the Gospel passion and
      resurrection scenes culminate and where Acts begins its expanding witness
      narrative.
    source_refs:
      - source_id: luke
        citation: Luke 24:44-49

people:
  - id: jesus
    name: Jesus Christ
    aliases: []
    role: Risen Lord
    summary: >
      Jesus is the central figure of the Gospels and Acts, announced in the
      birth narratives, active in Galilean and Judean ministry, crucified and
      raised, and in Acts presented as the ascended Lord who commissions the
      apostles.
    source_refs:
      - source_id: luke
        citation: Luke 24:36-53

  - id: peter
    name: Peter
    aliases:
      - Simon Peter
      - Cephas
    role: Apostle
    summary: >
      Peter is a leading disciple in the Gospel tradition and a major apostolic
      witness in Acts, appearing in call narratives, resurrection contexts, and
      the early Jerusalem mission.
    source_refs:
      - source_id: luke
        citation: Luke 5:1-11

  - id: john
    name: John
    aliases: []
    role: Apostle
    summary: >
      John appears among Jesus's close disciples in the Gospel narratives and
      later alongside Peter in the opening Jerusalem ministry of Acts.
    source_refs:
      - source_id: luke
        citation: Luke 5:10

  - id: james_zebedee
    name: James
    aliases:
      - James son of Zebedee
    role: Apostle
    summary: >
      James son of Zebedee is one of Jesus's close disciples in the Gospels and
      later becomes an early apostolic martyr in Acts.
    source_refs:
      - source_id: luke
        citation: Luke 5:10

  - id: john_the_baptist
    name: John the Baptist
    aliases:
      - John
      - John son of Zechariah
    source_refs:
      - source_id: luke
        citation: Luke 3:1-22

  - id: mary_mother_of_jesus
    name: Mary
    aliases:
      - Mother of Jesus
    role: Mother of Jesus
    summary: >
      Mary receives the annunciation in Luke, bears Jesus in Bethlehem, and
      anchors the Gospel's opening scenes of promise and obedience.
    source_refs:
      - source_id: luke
        citation: Luke 1:26-38

  - id: joseph_husband_of_mary
    name: Joseph
    aliases:
      - Husband of Mary
    role: Davidic guardian of Jesus's family
    summary: >
      Joseph accompanies Mary to Bethlehem in Luke and situates Jesus's birth
      in relation to Davidic ancestry and imperial registration.
    source_refs:
      - source_id: luke
        citation: Luke 2:1-7

  - id: martha
    name: Martha
    aliases: []
    role: Host and disciple
    summary: >
      Martha welcomes Jesus into her household in Luke and John and is
      remembered alongside Mary and Lazarus in scenes centered on hospitality,
      confession, grief, and discipleship.
    source_refs:
      - source_id: luke
        citation: Luke 10:38-42

  - id: mary_of_bethany
    name: Mary of Bethany
    aliases: []
    role: Disciple
    summary: >
      Mary of Bethany is portrayed as a hearer of Jesus's teaching and a member
      of the Bethany household remembered for attentive discipleship and grief
      around Lazarus's death.
    source_refs:
      - source_id: luke
        citation: Luke 10:38-42

  - id: zacchaeus
    name: Zacchaeus
    aliases: []
    role: Chief tax collector
    summary: >
      Zacchaeus becomes a memorable Luke figure through his encounter with
      Jesus in Jericho and his concrete response of restitution.
    source_refs:
      - source_id: luke
        citation: Luke 19:1-10

  - id: cleopas
    name: Cleopas
    aliases: []
    role: Disciple on the Emmaus road
    summary: >
      Cleopas is one of the travelers in Luke's Emmaus narrative and becomes a
      witness to the risen Jesus in the breaking of bread.
    source_refs:
      - source_id: luke
        citation: Luke 24:13-35

events:
  - id: luke_001
    title: Annunciation to Mary
    summary: >
      Gabriel's message to Mary frames Luke's opening around divine promise,
      the Holy Spirit, and Mary's obedient reception of Jesus's coming birth.
    date:
      start_year: -6
      end_year: -5
      certainty: estimated
    location_id: nazareth
    participants:
      - mary_mother_of_jesus
    tag_ids:
      - holy_spirit
      - nativity
    source_refs:
      - source_id: luke
        citation: Luke 1:26-38
    related_event_ids:
      - luke_002

  - id: luke_002
    title: Birth of Jesus in Bethlehem
    summary: >
      Luke places Jesus's birth in Bethlehem and frames it as the arrival of
      David's promised savior in a setting of humility and joy.
    date:
      start_year: -5
      end_year: -4
      certainty: estimated
    location_id: bethlehem
    participants:
      - jesus
      - mary_mother_of_jesus
      - joseph_husband_of_mary
    tag_ids:
      - nativity
      - holy_spirit
    source_refs:
      - source_id: luke
        citation: Luke 2:1-20
    related_event_ids:
      - luke_001
      - luke_010

  - id: luke_010
    title: Baptism of Jesus While Praying
    summary: >
      Luke frames Jesus's baptism with prayer, the descent of the Spirit, and
      the heavenly voice that marks the transition into public ministry.
    date:
      start_year: 27
      end_year: 27
      certainty: estimated
    location_id: jordan_river
    participants:
      - jesus
      - john_the_baptist
    tag_ids:
      - holy_spirit
    source_refs:
      - source_id: luke
        citation: Luke 3:21-22
    related_event_ids:
      - luke_002
      - luke_003

  - id: luke_003
    title: Jesus Reads Isaiah at Nazareth
    summary: >
      Jesus's synagogue reading in Nazareth becomes Luke's inaugural public
      ministry scene and announces good news to the poor and oppressed.
    date:
      start_year: 27
      end_year: 27
      certainty: estimated
    location_id: nazareth
    participants:
      - jesus
    tag_ids:
      - preaching
      - leadership
    source_refs:
      - source_id: luke
        citation: Luke 4:16-30
    related_event_ids:
      - luke_004

  - id: luke_004
    title: Call of Simon Peter
    summary: >
      The miraculous catch of fish and Jesus's call of Simon Peter, James, and
      John frames discipleship around both wonder and future witness.
    date:
      start_year: 27
      end_year: 27
      certainty: estimated
    location_id: capernaum
    participants:
      - jesus
      - peter
      - john
      - james_zebedee
    tag_ids:
      - apostles
      - miracle
    source_refs:
      - source_id: luke
        citation: Luke 5:1-11
    related_event_ids:
      - luke_003
      - luke_011

  - id: luke_011
    title: Feeding of the Five Thousand near Bethsaida
    summary: >
      Jesus feeds the gathered crowd near Bethsaida, and Luke presents the sign
      as abundant provision that also forms the disciples for the mission to
      come.
    date:
      start_year: 29
      end_year: 29
      certainty: estimated
    location_id: bethsaida
    participants:
      - jesus
      - peter
      - john
      - james_zebedee
    tag_ids:
      - miracle
      - discipleship
    source_refs:
      - source_id: luke
        citation: Luke 9:10-17
    related_event_ids:
      - luke_004
      - luke_005

  - id: luke_005
    title: Mary and Martha Welcome Jesus
    summary: >
      Luke's Bethany household scene contrasts distracted service and attentive
      listening while portraying discipleship within ordinary hospitality.
    date:
      start_year: 29
      end_year: 29
      certainty: estimated
    location_id: bethany
    participants:
      - jesus
      - martha
      - mary_of_bethany
    tag_ids:
      - discipleship
    source_refs:
      - source_id: luke
        citation: Luke 10:38-42
    related_event_ids:
      - luke_006

  - id: luke_006
    title: Zacchaeus Receives Jesus
    summary: >
      The Jericho encounter with Zacchaeus presents repentance and restitution
      as signs of salvation arriving to a household.
    date:
      start_year: 29
      end_year: 29
      certainty: estimated
    location_id: jericho
    participants:
      - jesus
      - zacchaeus
    tag_ids:
      - conversion
      - discipleship
    source_refs:
      - source_id: luke
        citation: Luke 19:1-10
    related_event_ids:
      - luke_012

  - id: luke_012
    title: Triumphal Entry into Jerusalem
    summary: >
      Jesus enters Jerusalem publicly as the king who comes in the name of the
      Lord, and Luke frames the scene as a decisive threshold to the passion
      narrative.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
    tag_ids:
      - leadership
      - preaching
    source_refs:
      - source_id: luke
        citation: Luke 19:28-44
    related_event_ids:
      - luke_006
      - luke_007

  - id: luke_007
    title: Emmaus Road Encounter
    summary: >
      The risen Jesus opens the Scriptures to travelers on the Emmaus road and
      is recognized in the breaking of bread.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: emmaus
    participants:
      - jesus
      - cleopas
    tag_ids:
      - resurrection
      - preaching
    source_refs:
      - source_id: luke
        citation: Luke 24:13-35
    related_event_ids:
      - luke_008

  - id: luke_008
    title: Risen Jesus Commissions the Disciples in Jerusalem
    summary: >
      Jesus interprets the Law, Prophets, and Psalms in Jerusalem and
      commissions the disciples to proclaim repentance and forgiveness to all
      nations.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
      - peter
      - john
      - james_zebedee
    tag_ids:
      - leadership
      - preaching
      - resurrection
    source_refs:
      - source_id: luke
        citation: Luke 24:44-49
    related_event_ids:
      - luke_007
      - luke_009

  - id: luke_009
    title: Ascension Near Bethany
    summary: >
      Luke closes with Jesus blessing the disciples near Bethany and being
      carried up, creating the narrative bridge into the witness era of Acts.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: bethany
    participants:
      - jesus
      - peter
      - john
      - james_zebedee
    tag_ids:
      - apostles
      - leadership
      - resurrection
    source_refs:
      - source_id: luke
        citation: Luke 24:50-53
    related_event_ids:
      - luke_008

journeys: []

relationships:
  - id: relationship_jesus_peter_calls
    from_type: person
    from_id: jesus
    to_type: person
    to_id: peter
    relationship_type: calls_to_follow
    source_refs:
      - source_id: luke
        citation: Luke 5:1-11

  - id: relationship_martha_mary_siblings
    from_type: person
    from_id: martha
    to_type: person
    to_id: mary_of_bethany
    relationship_type: sibling
    source_refs:
      - source_id: luke
        citation: Luke 10:38-42

  - id: relationship_jesus_zacchaeus_restores
    from_type: person
    from_id: jesus
    to_type: person
    to_id: zacchaeus
    relationship_type: receives_with_salvation
    source_refs:
      - source_id: luke
        citation: Luke 19:1-10

tags:
  - id: apostles
    label: Apostles
    description: Events centered on the apostolic witnesses.
    group: people

  - id: conversion
    label: Conversion
    description: Events marked by a dramatic turn toward faith in Jesus.
    group: response

  - id: discipleship
    label: Discipleship
    description: Events focused on hearing, following, and responding to Jesus.
    group: response

  - id: holy_spirit
    label: Holy Spirit
    description: Events centered on the Spirit's empowering presence.
    group: theology

  - id: leadership
    label: Leadership
    description: Events focused on communal leadership and apostolic direction.
    group: governance

  - id: miracle
    label: Miracle
    description: Events marked by extraordinary acts of divine power.
    group: sign

  - id: nativity
    label: Nativity
    description: Events focused on Jesus's conception, birth, and early promise.
    group: theology

  - id: preaching
    label: Preaching
    description: Events centered on proclamation, speech, or public witness.
    group: proclamation

  - id: resurrection
    label: Resurrection
    description: Events centered on post-resurrection witness and recognition.
    group: theology

literary_units:
  - id: luke_unit_001
    book_id: luke
    title: Infancy And Preparation Narratives
    unit_type: narrative
    passage:
      start_chapter: 1
      start_verse: 5
      end_chapter: 3
      end_verse: 22
    summary: >
      Luke opens with temple, annunciation, nativity, and baptism material
      that frames Jesus's mission within Israel's hopes and the Spirit's work.
    related_event_ids:
      - luke_001
      - luke_002
      - luke_010
    source_refs:
      - source_id: luke
        citation: Luke 1:5-3:22
  - id: luke_unit_002
    book_id: luke
    title: Galilean Ministry And Call Narratives
    unit_type: narrative
    passage:
      start_chapter: 4
      start_verse: 14
      end_chapter: 9
      end_verse: 50
    summary: >
      Early public ministry in Galilee establishes Jesus's proclamation,
      healing, rejection, and disciple-forming authority.
    related_event_ids:
      - luke_003
      - luke_004
      - luke_011
    source_refs:
      - source_id: luke
        citation: Luke 4:14-9:50
  - id: luke_unit_003
    book_id: luke
    title: Journey Toward Jerusalem
    unit_type: narrative
    passage:
      start_chapter: 9
      start_verse: 51
      end_chapter: 19
      end_verse: 44
    summary: >
      The long travel narrative gathers teaching, encounters, hospitality, and
      response scenes on the way toward Jerusalem.
    related_event_ids:
      - luke_005
      - luke_006
      - luke_012
    source_refs:
      - source_id: luke
        citation: Luke 9:51-19:44
  - id: luke_unit_004
    book_id: luke
    title: Resurrection Witness And Ascension
    unit_type: epilogue
    passage:
      start_chapter: 24
      start_verse: 13
      end_chapter: 24
      end_verse: 53
    summary: >
      Luke closes with Emmaus recognition, Jerusalem commissioning, and the
      ascension near Bethany as the hinge into Acts.
    related_event_ids:
      - luke_007
      - luke_008
      - luke_009
    source_refs:
      - source_id: luke
        citation: Luke 24:13-53

claims:
  - id: claim_synoptic_bethlehem_birth
    statement: >
      Matthew and Luke both anchor Jesus's birth in Bethlehem, while each
      Gospel preserves distinct surrounding infancy material and theological
      emphasis.
    claim_type: synoptic_continuity
    confidence: high
    related_event_ids:
      - luke_002
    related_person_ids:
      - jesus
      - mary_mother_of_jesus
      - joseph_husband_of_mary
    related_place_ids:
      - bethlehem
    source_refs:
      - source_id: luke
        citation: Luke 2:1-20
  - id: claim_synoptic_baptism_inaugural_witness
    statement: >
      Matthew, Mark, and Luke each preserve Jesus's baptism by John as an
      inaugural public scene, though they frame the heavenly affirmation and
      surrounding narrative differently.
    claim_type: synoptic_parallel
    confidence: high
    related_event_ids:
      - luke_010
    related_person_ids:
      - jesus
      - john_the_baptist
    related_place_ids:
      - jordan_river
    source_refs:
      - source_id: luke
        citation: Luke 3:21-22
  - id: claim_synoptic_feeding_five_thousand
    statement: >
      Matthew, Mark, and Luke all preserve the feeding of the five thousand,
      while retaining distinct geographic and narrative emphases.
    claim_type: synoptic_parallel
    confidence: high
    related_event_ids:
      - luke_011
    related_person_ids:
      - jesus
      - peter
      - john
      - james_zebedee
    related_place_ids:
      - bethsaida
    source_refs:
      - source_id: luke
        citation: Luke 9:10-17
  - id: claim_synoptic_entry_jerusalem
    statement: >
      Matthew, Mark, and Luke each narrate Jesus's royal entry into Jerusalem
      as a public threshold to the passion, while preserving witness-specific
      details.
    claim_type: synoptic_parallel
    confidence: high
    related_event_ids:
      - luke_012
    related_person_ids:
      - jesus
    related_place_ids:
      - jerusalem
    source_refs:
      - source_id: luke
        citation: Luke 19:28-44
  - id: claim_luke_nazareth_programmatic_scene
    statement: >
      Many interpreters treat Luke's Nazareth synagogue episode as a
      programmatic scene placed early to frame the Gospel's concern for the
      poor, the outsider, and Spirit-led proclamation.
    claim_type: literary_structure
    confidence: medium
    related_event_ids:
      - luke_003
    related_person_ids:
      - jesus
    related_place_ids:
      - nazareth
    source_refs:
      - source_id: green_luke_commentary
        citation: Commentary discussion on Luke 4:16-30
      - source_id: fitzmyer_luke_anchor
        citation: Anchor Bible discussion on Luke 4
  - id: claim_luke_zacchaeus_restitution
    statement: >
      Zacchaeus's restitution language is often read as a concrete sign that
      repentance in Luke includes repaired economic relationships rather than
      inward sentiment alone.
    claim_type: theological_interpretation
    confidence: medium
    related_event_ids:
      - luke_006
    related_person_ids:
      - zacchaeus
      - jesus
    related_place_ids:
      - jericho
    source_refs:
