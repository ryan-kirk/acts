metadata:
  dataset_id: john
  title: Gospel of John Canonical Dataset
  version: "1.0.0"
  schema_version: "1.0.0"
  description: >
    Canonical John dataset for Bible Time & Place Explorer, modeled with
    signs, discourses, feast-linked chronology, and source-backed claims that
    preserve Johannine distinctiveness within the shared library.
  created: "2026-06-17"
  updated: "2026-06-17"

books:
  - id: john
    label: John
    title: Gospel of John
    testament: new_testament
    canonical_order: 4
    corpus: gospel
    genre:
      - gospel
      - narrative
      - discourse
    summary: >
      John presents Jesus through selected signs, extended discourses, and a
      tightly framed feast cycle that reveals identity, conflict, witness, and
      glory in a distinctive narrative voice.
    authorship_note: >
      Traditionally associated with John, while the Gospel's narrative voice
      and later authorship discussions remain matters for source-backed claims
      rather than canonical summary.
    primary_source_id: john
    source_refs:
      - source_id: john
        citation: John 1:1-21:25

sources:
  - id: john
    name: Gospel of John
    type: scripture
    citation: New Testament, John 1-21
    author: Traditionally associated with John
    publication_date: 1st century AD
    usage_rights:
      status: not_applicable
      attribution_text: >
        This dataset stores canonical scripture citations to John and does not
        reproduce licensed Bible translation text.
      usage_notes: >
        Event, place, person, and literary-unit records remain citation based
        only. Any future embedded translation text will require separate rights
        review.
      trademark_usage_note: >
        If ESV-branded scripture text is added later, the ESV name and logo
        must not be used as product branding without permission.
      commercial_use_note: >
        Any future commercial Bible-reference workflow that embeds direct ESV
        text will require written permission and explicit release review.
      requires_written_permission_for_commercial_use: true
  - id: carson_john_commentary
    name: The Gospel According to John
    type: commentary
    author: D. A. Carson
    citation: Pillar New Testament Commentary
    publication_date: "1991"
    usage_rights:
      status: restricted
      attribution_text: >
        Commentary references support interpretive claims without embedding
        copyrighted prose.
      usage_notes: >
        Any future quotations or extended excerpts require publisher-specific
        rights review and attribution.

places:
  - id: cana
    name: Cana
    latitude: 32.7569
    longitude: 35.3439
    region: Galilee
    modern_country: Israel
    location_certainty: traditional
    summary: >
      Cana is remembered in John's Gospel as the setting of the first sign,
      where water becomes wine and Jesus's glory is revealed to the disciples.
    source_refs:
      - source_id: john
        citation: John 2:1-11

  - id: jerusalem
    name: Jerusalem
    latitude: 31.7683
    longitude: 35.2137
    region: Judea
    modern_country: Israel
    location_certainty: exact
    source_refs:
      - source_id: john
        citation: John 2:13-22

  - id: sychar
    name: Sychar
    latitude: 32.2127
    longitude: 35.2816
    region: Samaria
    modern_country: Palestine
    location_certainty: traditional
    summary: >
      Sychar in Samaria is linked to the well-side encounter where Jesus's
      conversation with a Samaritan woman opens into wider witness among the
      townspeople.
    source_refs:
      - source_id: john
        citation: John 4:4-42

  - id: sea_of_galilee
    name: Sea of Galilee
    latitude: 32.8333
    longitude: 35.5833
    region: Galilee
    modern_country: Israel
    location_certainty: exact
    source_refs:
      - source_id: john
        citation: John 6:1-21

  - id: capernaum
    name: Capernaum
    latitude: 32.8803
    longitude: 35.5736
    region: Galilee
    modern_country: Israel
    location_certainty: approximate
    source_refs:
      - source_id: john
        citation: John 6:22-71

  - id: bethany
    name: Bethany
    latitude: 31.7717
    longitude: 35.2656
    region: Judea
    modern_country: Palestine
    location_certainty: traditional
    source_refs:
      - source_id: john
        citation: John 11:1-46

people:
  - id: jesus
    name: Jesus Christ
    aliases: []
    source_refs:
      - source_id: john
        citation: John 2:1-21:25

  - id: mary_mother_of_jesus
    name: Mary
    aliases:
      - Mother of Jesus
    source_refs:
      - source_id: john
        citation: John 2:1-5

  - id: nicodemus
    name: Nicodemus
    aliases: []
    role: Pharisee and later sympathetic witness
    summary: >
      Nicodemus appears in John's Gospel as a Pharisee who comes by night,
      engages Jesus about new birth, later speaks cautiously in Jesus's
      defense, and participates in burial care.
    source_refs:
      - source_id: john
        citation: John 3:1-21

  - id: samaritan_woman
    name: Samaritan Woman
    aliases:
      - Woman at the well
    role: Samaritan witness
    summary: >
      The unnamed Samaritan woman at the well becomes a key witness figure in
      John as private conversation opens into public testimony among her town.
    source_refs:
      - source_id: john
        citation: John 4:4-42

  - id: martha
    name: Martha
    aliases: []
    source_refs:
      - source_id: john
        citation: John 11:20-27

  - id: mary_of_bethany
    name: Mary of Bethany
    aliases: []
    source_refs:
      - source_id: john
        citation: John 11:28-32

  - id: lazarus
    name: Lazarus
    aliases: []
    role: Bethany brother raised by Jesus
    summary: >
      Lazarus of Bethany stands at the center of one of John's climactic signs,
      where his death and restoration intensify both belief and opposition.
    source_refs:
      - source_id: john
        citation: John 11:1-46

  - id: peter
    name: Peter
    aliases:
      - Simon Peter
      - Cephas
    source_refs:
      - source_id: john
        citation: John 6:68-69

  - id: thomas
    name: Thomas
    aliases:
      - Didymus
    role: Disciple and resurrection witness
    summary: >
      Thomas moves from doubt to confession in John's resurrection narrative
      and becomes a focal witness to the risen Jesus's identity.
    source_refs:
      - source_id: john
        citation: John 20:24-29

  - id: mary_magdalene
    name: Mary Magdalene
    aliases: []
    source_refs:
      - source_id: john
        citation: John 20:1-18

events:
  - id: john_001
    title: Water into Wine at Cana
    summary: >
      At a wedding in Cana, Jesus turns water into wine, revealing glory in a
      sign that marks the opening public disclosure of his identity in John.
    date:
      start_year: 27
      end_year: 27
      certainty: estimated
    location_id: cana
    participants:
      - jesus
      - mary_mother_of_jesus
    tag_ids:
      - sign
      - identity
    source_refs:
      - source_id: john
        citation: John 2:1-11
    related_event_ids:
      - john_002

  - id: john_002
    title: Temple Cleansing at Passover
    summary: >
      Jesus drives merchants from the temple courts at Jerusalem and frames the
      sign in relation to his Father's house and the raising of the temple of
      his body.
    date:
      start_year: 27
      end_year: 27
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
    tag_ids:
      - passover
      - identity
    source_refs:
      - source_id: john
        citation: John 2:13-22
    related_event_ids:
      - john_001
      - john_003

  - id: john_003
    title: Nicodemus and the New Birth Discourse
    summary: >
      Jesus tells Nicodemus that entry into the kingdom requires birth from
      above, placing witness, Spirit, and belief at the center of the
      conversation.
    date:
      start_year: 27
      end_year: 27
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
      - nicodemus
    tag_ids:
      - discourse
      - identity
    source_refs:
      - source_id: john
        citation: John 3:1-21
    related_event_ids:
      - john_002
      - john_004

  - id: john_004
    title: Samaritan Woman and Many Believe at Sychar
    summary: >
      Jesus speaks with a Samaritan woman at the well, and her testimony helps
      draw many in Sychar toward belief.
    date:
      start_year: 27
      end_year: 27
      certainty: estimated
    location_id: sychar
    participants:
      - jesus
      - samaritan_woman
    tag_ids:
      - discourse
      - witness
    source_refs:
      - source_id: john
        citation: John 4:4-42
    related_event_ids:
      - john_003
      - john_005

  - id: john_005
    title: Healing at Bethesda during a Feast
    summary: >
      Jesus heals a disabled man in Jerusalem on a Sabbath within a feast
      setting, escalating conflict around authority, work, and divine agency.
    date:
      start_year: 28
      end_year: 28
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
    tag_ids:
      - sign
      - feast
    source_refs:
      - source_id: john
        citation: John 5:1-18
    related_event_ids:
      - john_004
      - john_006

  - id: john_006
    title: Feeding of the Five Thousand near Passover
    summary: >
      Near Passover, Jesus feeds the crowd across the Sea of Galilee and the
      sign becomes the narrative gateway into later discourse about true bread.
    date:
      start_year: 29
      end_year: 29
      certainty: estimated
    location_id: sea_of_galilee
    participants:
      - jesus
      - peter
    tag_ids:
      - passover
      - sign
    source_refs:
      - source_id: john
        citation: John 6:1-15
    related_event_ids:
      - john_005
      - john_007

  - id: john_007
    title: Bread of Life Discourse at Capernaum
    summary: >
      In Capernaum Jesus interprets the bread sign through extended teaching on
      life, belief, and abiding, forcing a sharper divide among hearers.
    date:
      start_year: 29
      end_year: 29
      certainty: estimated
    location_id: capernaum
    participants:
      - jesus
      - peter
    tag_ids:
      - discourse
      - passover
    source_refs:
      - source_id: john
        citation: John 6:22-71
    related_event_ids:
      - john_006
      - john_008

  - id: john_008
    title: Healing of the Man Born Blind
    summary: >
      Jesus restores sight to a man born blind, and the sign develops into a
      sustained conflict over light, testimony, and true seeing.
    date:
      start_year: 29
      end_year: 29
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
    tag_ids:
      - tabernacles
      - sign
    source_refs:
      - source_id: john
        citation: John 9:1-41
    related_event_ids:
      - john_007
      - john_009

  - id: john_009
    title: Raising of Lazarus at Bethany
    summary: >
      Jesus raises Lazarus in Bethany, revealing life-giving authority in a
      sign that sharpens both belief and the movement toward lethal opposition.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: bethany
    participants:
      - jesus
      - lazarus
      - martha
      - mary_of_bethany
    tag_ids:
      - sign
      - identity
    source_refs:
      - source_id: john
        citation: John 11:1-46
    related_event_ids:
      - john_008
      - john_010

  - id: john_010
    title: Triumphal Entry before Passover
    summary: >
      Jesus enters Jerusalem publicly as the crowd interprets the moment
      through royal and scriptural expectation on the threshold of Passover.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
    tag_ids:
      - passover
      - witness
    source_refs:
      - source_id: john
        citation: John 12:12-19
    related_event_ids:
      - john_009
      - john_011

  - id: john_011
    title: Farewell Discourse and Footwashing
    summary: >
      On the eve of the passion, Jesus washes the disciples' feet and frames
      the farewell through abiding, love, witness, and promised help from the
      Spirit.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
      - peter
      - thomas
    tag_ids:
      - discourse
      - passover
    source_refs:
      - source_id: john
        citation: John 13:1-17:26
    related_event_ids:
      - john_010
      - john_012

  - id: john_012
    title: Thomas Confesses the Risen Jesus
    summary: >
      The risen Jesus invites Thomas to see and believe, and Thomas responds
      with a confession that becomes one of the Gospel's clearest identity
      declarations.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: jerusalem
    participants:
      - jesus
      - thomas
    tag_ids:
      - resurrection
      - identity
    source_refs:
      - source_id: john
        citation: John 20:24-29
    related_event_ids:
      - john_011
      - john_013

  - id: john_013
    title: Breakfast by the Sea and Restoration of Peter
    summary: >
      Jesus meets the disciples by the sea, provides breakfast, and restores
      Peter to shepherding responsibility through repeated questioning and
      commission.
    date:
      start_year: 30
      end_year: 30
      certainty: estimated
    location_id: sea_of_galilee
    participants:
      - jesus
      - peter
      - thomas
    tag_ids:
      - resurrection
      - leadership
    source_refs:
      - source_id: john
        citation: John 21:1-19
    related_event_ids:
      - john_012

