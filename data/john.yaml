tags:
  - id: sign
    label: Sign
    description: >
      Events where Jesus's works are presented as revelatory signs tied to
      identity and belief.
    group: sign

  - id: discourse
    label: Discourse
    description: >
      Extended teaching scenes that carry Johannine theological and narrative
      argument.
    group: discourse

  - id: identity
    label: Identity
    description: >
      Events that foreground revelation about who Jesus is and how he should
      be understood.
    group: theology

  - id: witness
    label: Witness
    description: >
      Events centered on testimony, confession, proclamation, or public
      recognition.
    group: proclamation

  - id: passover
    label: Passover
    description: >
      Events explicitly tied to Passover chronology or symbolism in John's
      narrative.
    group: feast

  - id: feast
    label: Festival
    description: >
      Events linked to a major feast setting that shapes chronology or public
      conflict.
    group: feast

  - id: tabernacles
    label: Tabernacles
    description: >
      Events linked to the Festival of Tabernacles and its light or water
      symbolism.
    group: feast

  - id: resurrection
    label: Resurrection
    description: Events centered on post-resurrection witness and recognition.
    group: theology

  - id: leadership
    label: Leadership
    description: Events focused on communal leadership and apostolic direction.
    group: governance

