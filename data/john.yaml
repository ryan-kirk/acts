claims:
  - id: claim_john_signs_structure
    statement: >
      Many interpreters read John's narrative as organized around a selective
      pattern of signs that reveal Jesus's identity and interpret belief.
    claim_type: literary_structure
    confidence: medium
    related_event_ids:
      - john_001
      - john_009
    related_person_ids:
      - jesus
    related_place_ids:
      - cana
      - bethany
    source_refs:
      - source_id: john
        citation: John 2:1-11; 11:1-46
      - source_id: carson_john_commentary
        citation: Carson, John, on 2:1-11 and 11:1-46

  - id: claim_john_passover_chronology
    statement: >
      John's explicit feast notices, especially the repeated Passover markers,
      are often used to model a longer public ministry chronology than the
      compressed reading one might infer without them.
    claim_type: chronology_model
    confidence: medium
    related_event_ids:
      - john_002
      - john_006
      - john_010
      - john_011
    related_person_ids:
      - jesus
    related_place_ids:
      - jerusalem
      - sea_of_galilee
    source_refs:
      - source_id: john
        citation: John 2:13; 6:4; 12:1; 13:1
      - source_id: carson_john_commentary
        citation: Carson, John, on feast chronology

  - id: claim_john_temple_sequence_distinct
    statement: >
      John's placement of the temple action near the Gospel's opening is often
      treated as a deliberate compositional framing choice rather than a detail
      that should be silently merged into Synoptic sequencing.
    claim_type: compositional_sequence
    confidence: medium
    related_event_ids:
      - john_002
    related_person_ids:
      - jesus
    related_place_ids:
      - jerusalem
    source_refs:
      - source_id: john
        citation: John 2:13-22
      - source_id: carson_john_commentary
        citation: Carson, John, on 2:13-22

  - id: claim_john_discourse_sign_interplay
    statement: >
      John regularly pairs a sign with extended discourse so the act and the
      teaching interpret one another rather than functioning as isolated
      episodes.
    claim_type: narrative_structure
    confidence: medium
    related_event_ids:
      - john_006
      - john_007
      - john_011
    related_person_ids:
      - jesus
      - peter
    related_place_ids:
      - sea_of_galilee
      - capernaum
      - jerusalem
    source_refs:
      - source_id: john
        citation: John 6:1-71; 13:1-17:26
      - source_id: carson_john_commentary
        citation: Carson, John, on discourse framing

  - id: claim_john_samaria_witness_scope
    statement: >
      The Samaritan mission scene in John broadens witness beyond Judea and
      anticipates a larger harvest theme through testimony rather than formal
      travel narrative.
    claim_type: narrative_structure
    confidence: medium
    related_event_ids:
      - john_004
    related_person_ids:
      - jesus
      - samaritan_woman
    related_place_ids:
      - sychar
    source_refs:
      - source_id: john
        citation: John 4:4-42
      - source_id: carson_john_commentary
        citation: Carson, John, on 4:4-42

  - id: claim_john_lazarus_conflict_catalyst
    statement: >
      John's Lazarus sign functions not only as a revelation of life-giving
      power but also as a narrative catalyst that intensifies official plans
      against Jesus.
    claim_type: narrative_structure
    confidence: medium
    related_event_ids:
      - john_009
      - john_010
    related_person_ids:
      - jesus
      - lazarus
    related_place_ids:
      - bethany
      - jerusalem
    source_refs:
      - source_id: john
        citation: John 11:1-12:19
      - source_id: carson_john_commentary
        citation: Carson, John, on 11:1-12:19
