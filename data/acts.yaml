claims:
  - id: claim_acts_caesarea_context
    statement: >
      Caesarea Maritima functioned as the Roman administrative capital of
      Judaea in the early first century, matching Acts's portrayal of
      Cornelius's household and later Roman custody proceedings there.
    claim_type: historical_context
    confidence: medium
    related_event_ids:
      - acts_007
    related_person_ids:
      - cornelius
    related_place_ids:
      - caesarea
    source_refs:
      - source_id: josephus_antiquities
        citation: Antiquities 19.338-352
      - source_id: barrington_atlas
        citation: Barrington Atlas, Syria-Meroe regional mapping
  - id: claim_acts_gallio_anchor
    statement: >
      The Gallio inscription provides the strongest fixed chronological anchor
      for Paul's second-journey ministry in Achaia, helping situate nearby
      Macedonian and Athenian episodes around AD 51-52.
    claim_type: chronology_anchor
    confidence: high
    related_event_ids:
      - acts_011
      - acts_012
    related_person_ids:
      - paul
    related_place_ids:
      - philippi
      - athens
    source_refs:
      - source_id: gallio_inscription
        citation: Delphi Inscription, Fouilles de Delphes III 4:286
      - source_id: winter_gallio_judgement
        citation: Tyndale Bulletin 57.2 (2006)
  - id: claim_acts_areopagus_literary_context
    statement: >
      Paul's Areopagus address likely echoes Aratus's Phaenomena, showing
      engagement with Hellenistic literary culture rather than a purely
      intra-scriptural proof pattern.
    claim_type: literary_context
    confidence: medium
    related_event_ids:
      - acts_012
    related_person_ids:
      - paul
    related_place_ids:
      - athens
    source_refs:
      - source_id: aratus_phaenomena
        citation: Phaenomena 1-5
      - source_id: witherington_acts_commentary
        citation: Commentary discussion on Acts 17:22-31
  - id: claim_acts_temple_barrier_context
    statement: >
      The Jerusalem Temple warning inscription gives concrete archaeological
      context for the accusation that Paul brought a Gentile beyond the
      permitted boundary and thereby triggered the arrest scene.
    claim_type: archaeological_context
    confidence: high
    related_event_ids:
      - acts_015
    related_person_ids:
      - paul
    related_place_ids:
      - jerusalem
    source_refs:
      - source_id: temple_warning_inscription
        citation: Temple Warning Inscription
      - source_id: witherington_acts_commentary
        citation: Commentary discussion on Acts 21:27-29
  - id: claim_acts_malta_identification
    statement: >
      The shipwreck setting is traditionally identified with Malta, but route
      reconstruction and coastal arguments remain interpretive rather than
      explicit in Acts itself.
    claim_type: geographic_identification
    confidence: medium
    related_event_ids:
      - acts_016
    related_person_ids:
      - paul
    related_place_ids:
      - malta
    source_refs:
      - source_id: barrington_atlas
        citation: Barrington Atlas, central Mediterranean mapping
      - source_id: witherington_acts_commentary
        citation: Commentary discussion on Acts 27-28
  - id: claim_acts_rome_later_tradition
    statement: >
      Eusebius preserves a later Christian tradition that Paul's Roman
      imprisonment continued into a wider ministry and possible release beyond
      the open-ended close of Acts.
    claim_type: later_tradition
    confidence: low
    related_event_ids:
      - acts_017
    related_person_ids:
      - paul
    related_place_ids:
      - rome
    source_refs:
      - source_id: eusebius_church_history
        citation: Ecclesiastical History 2.22
  - id: claim_acts_western_text_expansion
    statement: >
      Western-text witnesses such as Codex Bezae preserve expanded readings in
      Acts, showing how later manuscript traditions sometimes elaborated travel
      and speech material beyond the shorter canonical form.
    claim_type: manuscript_tradition
    confidence: low
    related_event_ids:
      - acts_016
      - acts_017
    related_person_ids:
      - paul
    related_place_ids:
      - malta
      - rome
    source_refs:
      - source_id: codex_bezae
        citation: Codex Bezae witness to Acts travel and speech expansions
